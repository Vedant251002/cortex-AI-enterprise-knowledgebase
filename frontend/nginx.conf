# Minimal nginx config for serving the built React SPA and proxying API/SSE calls
# to the backend service when both containers run under docker-compose.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router (client-side routing) — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + SSE chat stream to the backend container.
    # (The SPA can instead call VITE_API_BASE_URL directly; this proxy is provided
    # as a convenience for same-origin deployments.)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
