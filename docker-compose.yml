
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cortex-backend:local
    container_name: cortex-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: cortex-frontend:local
    container_name: cortex-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
